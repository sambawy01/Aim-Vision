name: aimvision-camera-core CI

on:
  push:
    branches: [main]
    paths:
      - "aimvision-camera-core/**"
      - ".github/workflows/camera-core-ci.yml"
  pull_request:
    paths:
      - "aimvision-camera-core/**"
      - ".github/workflows/camera-core-ci.yml"

# Cancel in-progress runs on the same ref to keep CI fast.
concurrency:
  group: camera-core-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # TODO(camera-core): re-enable -D warnings after first engineer runs
  # cargo fmt --all && cargo clippy --workspace --fix.
  # RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: "1"

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    # TODO(camera-core): scaffolding wasn't run through `cargo fmt`; first
    # Rust engineer should run `cargo fmt --all` and re-promote to blocking.
    continue-on-error: true
    defaults:
      run:
        working-directory: aimvision-camera-core
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (1.85)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aimvision-camera-core
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (1.85)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: aimvision-camera-core
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: cargo test (workspace)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aimvision-camera-core
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (1.85)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: aimvision-camera-core
      - run: cargo test --workspace --all-features --no-fail-fast

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aimvision-camera-core
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        # ^0.21 supports CVSS 4.0 advisory parsing (older versions panic on
        # advisories like libcrux-poly1305 RUSTSEC-2026-0073).
        run: cargo install cargo-audit --locked --version "^0.21"
      - name: Audit
        # Advisory-only — informational, never blocks merge.
        continue-on-error: true
        run: cargo audit --deny warnings
