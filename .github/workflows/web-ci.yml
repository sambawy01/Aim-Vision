name: web-ci

on:
  push:
    branches: [main]
    paths:
      - 'aimvision-web/**'
      - '.github/workflows/web-ci.yml'
  pull_request:
    paths:
      - 'aimvision-web/**'
      - '.github/workflows/web-ci.yml'

defaults:
  run:
    working-directory: aimvision-web

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: aimvision-web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test --run

      - name: Build
        run: pnpm build
