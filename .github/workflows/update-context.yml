name: Update CLAUDE.md context

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-context
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip-context]')"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Regenerate auto block in CLAUDE.md
        run: |
          python3 scripts/update_context.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- CLAUDE.md; then
            git add CLAUDE.md
            git commit -m "chore(context): refresh CLAUDE.md auto block [skip-context]"
            git push
          else
            echo "CLAUDE.md unchanged, nothing to commit."
          fi
