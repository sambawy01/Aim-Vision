name: mobile-ci

on:
  push:
    branches: [main]
    paths:
      - 'aimvision-mobile/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    paths:
      - 'aimvision-mobile/**'
      - '.github/workflows/mobile-ci.yml'

defaults:
  run:
    working-directory: aimvision-mobile

jobs:
  lint-typecheck-test:
    name: lint + typecheck + jest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        # No frozen lockfile until pnpm-lock.yaml is committed (Sprint 4
        # pinning task). Until then, accept resolver drift in CI.
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test --ci --coverage=false
