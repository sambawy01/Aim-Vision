name: ml-ci

on:
  push:
    branches: [main]
    paths:
      - "aimvision-ml/**"
      - ".github/workflows/ml-ci.yml"
  pull_request:
    paths:
      - "aimvision-ml/**"
      - ".github/workflows/ml-ci.yml"

# Cancel superseded runs on the same ref.
concurrency:
  group: ml-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    name: lint + typecheck + test (CPU, no train extras)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: aimvision-ml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "aimvision-ml/uv.lock"

      # Heavy extras (torch, mmpose, mmengine, mmcv, openmim, coremltools)
      # require GPU images and are NOT installed here. CI exercises only the
      # lightweight lib + the inference-runtime extra.
      - name: Sync dependencies (dev + infer)
        run: uv sync --extra dev --extra infer

      - name: Ruff check
        run: uv run ruff check src tests

      - name: Ruff format check
        run: uv run ruff format --check src tests

      - name: Mypy
        run: uv run mypy src

      - name: Pytest
        run: uv run pytest -v
