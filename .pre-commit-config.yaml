# =============================================================================
# AIMVISION monorepo — pre-commit configuration
# =============================================================================
# Install:    pip install pre-commit && pre-commit install
# Run all:    pre-commit run --all-files
# Run hook:   pre-commit run gitleaks --all-files
# Update:     pre-commit autoupdate (then PR-review the diff)
#
# Conventions:
#   - Pin every hook to a SHA-locked tag (see https://pre-commit.com/#top_level-default_install_hook_types).
#   - Per-language linters (ruff, prettier, shfmt) live here so contributors get
#     them on commit; CI workflows assert the same versions.
# =============================================================================

default_install_hook_types: [pre-commit, commit-msg]
default_stages: [pre-commit]
fail_fast: false
minimum_pre_commit_version: "3.7.0"

repos:
  # ---------------------------------------------------------------------------
  # Hygiene
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
        args: [--allow-multiple-documents]
        # Helm templates contain Go-template directives that aren't valid YAML.
        exclude: |
          (?x)^(
            aimvision-infra/helm/.*/templates/.*\.yaml|
            aimvision-infra/helm/.*/tests/.*\.yaml
          )$
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-case-conflict
      - id: check-symlinks
      - id: detect-private-key

  # ---------------------------------------------------------------------------
  # Secret scanning — fail if a secret is about to be committed
  # ---------------------------------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        # `pre-commit` mode scans staged diffs only — fast.

  # ---------------------------------------------------------------------------
  # Python — ruff (lint + format) for aimvision-backend and aimvision-ml
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^(aimvision-backend|aimvision-ml)/.*\.py$
      - id: ruff-format
        files: ^(aimvision-backend|aimvision-ml)/.*\.py$

  # ---------------------------------------------------------------------------
  # JS/TS/YAML/MD — prettier
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, css, scss, json, markdown]
        additional_dependencies:
          - prettier@3.3.3
        # Skip rendered Helm output and lock files.
        exclude: |
          (?x)^(
            .*/package-lock\.json|
            .*/pnpm-lock\.yaml|
            .*/yarn\.lock|
            .*/Cargo\.lock|
            aimvision-infra/helm/.*/charts/.*
          )$

  # ---------------------------------------------------------------------------
  # Shell — shfmt format check
  # ---------------------------------------------------------------------------
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.10.0-2
    hooks:
      - id: shfmt
        args: ["-i", "2", "-ci", "-bn", "-d"]

  # ---------------------------------------------------------------------------
  # Shell — shellcheck for correctness
  # ---------------------------------------------------------------------------
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.10.0
    hooks:
      - id: shellcheck
        args: ["--severity=warning"]

  # ---------------------------------------------------------------------------
  # Helm chart — local-script lint (full lint runs in CI). We use a `local`
  # hook to avoid depending on third-party hook repos for what is a one-line
  # `helm lint` invocation. Skipped automatically if `helm` isn't on PATH.
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: helm-lint
        name: helm lint (aimvision chart)
        language: system
        entry: bash -c 'command -v helm >/dev/null 2>&1 || { echo "helm not installed; skipping"; exit 0; }; helm lint aimvision-infra/helm/aimvision --strict'
        files: ^aimvision-infra/helm/.*
        pass_filenames: false

  # ---------------------------------------------------------------------------
  # YAML lint — yamllint, but lenient (consistent with prettier)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: ["-d", "{extends: relaxed, rules: {line-length: disable}}"]
        # Same Helm-templates exclusion as check-yaml.
        exclude: |
          (?x)^(
            aimvision-infra/helm/.*/templates/.*\.yaml|
            aimvision-infra/helm/.*/tests/.*\.yaml
          )$
