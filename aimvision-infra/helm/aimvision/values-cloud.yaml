# =============================================================================
# AIMVISION — values-cloud.yaml (Railway-managed Kubernetes)
# =============================================================================
# Apply on top of values.yaml:
#   helm upgrade --install aim-cloud ./helm/aimvision \
#     -f helm/aimvision/values.yaml -f helm/aimvision/values-cloud.yaml
# =============================================================================

global:
  domain: aimvision.io
  tier: cloud
  region: eu-west-1
  # `aimvision.io/tier` is auto-emitted from `global.tier` by the labels
  # helper; do not duplicate it here.
  commonLabels:
    aimvision.io/region: eu-west-1

backend:
  replicas: 3
  ingress:
    host: "api.aimvision.io"
    tls:
      secretName: aimvision-api-tls
  env:
    LOG_LEVEL: info
    AIMVISION_TIER: "cloud"
    AIMVISION_OBJECT_STORE: "s3"
    AIMVISION_LLM_PROVIDER: "anthropic"
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 65

worker:
  replicas: 4
  env:
    LOG_LEVEL: info
    AIMVISION_TIER: "cloud"
    AIMVISION_OBJECT_STORE: "s3"
    AIMVISION_LLM_PROVIDER: "anthropic"

web:
  replicas: 2
  ingress:
    host: "app.aimvision.io"

# CloudNativePG — 3-instance HA, gp3 SSD, S3 backup with 30-day retention.
cnpg:
  enabled: true
  instances: 3
  storage:
    size: 200Gi
    storageClass: gp3
  walStorage:
    enabled: true
    size: 50Gi
    storageClass: gp3
  resources:
    requests:
      cpu: "2"
      memory: 4Gi
    limits:
      cpu: "8"
      memory: 16Gi
  backup:
    enabled: true
    target: "s3"
    retentionPolicy: "30d"
    s3:
      bucket: "aimvision-pg-backup-eu"
      path: "aimvision"
      region: "eu-west-1"
      credentialsSecretName: "cnpg-s3-creds"
      encryption: "AES256"
  postgresql:
    parameters:
      max_connections: "300"
      shared_buffers: "4GB"
      effective_cache_size: "12GB"
  # CNPG owns its own affinity schema — `spec.affinity.podAntiAffinity`
  # (raw k8s form) is rejected by the Cluster CRD. Use CNPG's keys instead;
  # this still pins one instance per zone.
  affinity:
    enablePodAntiAffinity: true
    podAntiAffinityType: required
    topologyKey: topology.kubernetes.io/zone

# Cloud uses S3 directly, NOT MinIO.
minio:
  enabled: false

# Cloud uses Anthropic / Together API. No in-cluster Ollama.
ollama:
  enabled: false

# Grafana Cloud agent ships metrics; cluster-internal ServiceMonitor not needed.
observability:
  serviceMonitor:
    enabled: false

# Use ExternalSecrets — pulls from cloud secret manager (e.g., AWS Secrets Manager
# wired via External Secrets Operator and a ClusterSecretStore named
# `aimvision-secrets`).
secrets:
  backend:
    provider: "external"

networkPolicy:
  enabled: true
  defaultDenyIngress: true
