{{- if .Values.backend.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aimvision.backend.fullname" . }}
  labels:
    {{- include "aimvision.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  {{- with (include "aimvision.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
    - name: metrics
      port: {{ .Values.backend.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
  selector:
    {{- include "aimvision.backend.selectorLabels" . | nindent 4 }}
{{- end }}
