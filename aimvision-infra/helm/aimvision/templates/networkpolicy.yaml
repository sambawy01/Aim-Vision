{{- if .Values.networkPolicy.enabled -}}
{{- /*
NetworkPolicies — default-deny ingress + explicit allows. Per
docs/security/multi-tenant-isolation.md and threat-model.md, the cluster
network is treated as untrusted. The four explicit allows we ship:
  1. ingress-controller -> backend  (HTTP / metrics)
  2. ingress-controller -> web      (HTTP)
  3. backend -> CNPG (5432)         (modeled implicitly via egress; CNPG side
                                      relies on its own NP if installed)
  4. backend -> ollama (11434)      (federation tier only; matched by labels)
  5. monitoring NS -> backend metrics port (Prometheus scrape)

We do NOT block egress in v0.1.0 — egress restriction is the next iteration's
concern (see scope below).
*/ -}}
{{- if .Values.networkPolicy.defaultDenyIngress -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "aimvision.fullname" . }}-default-deny-ingress
  labels:
    {{- include "aimvision.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress: []
---
{{- end }}
{{- if .Values.backend.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "aimvision.backend.fullname" . }}-allow-ingress-controller
  labels:
    {{- include "aimvision.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  podSelector:
    matchLabels:
      {{- include "aimvision.backend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            {{- toYaml .Values.networkPolicy.ingressControllerNamespaceSelector | nindent 12 }}
      ports:
        - protocol: TCP
          port: {{ .Values.backend.service.port }}
{{- if .Values.observability.serviceMonitor.enabled }}
    - from:
        - namespaceSelector:
            {{- toYaml .Values.networkPolicy.monitoringNamespaceSelector | nindent 12 }}
      ports:
        - protocol: TCP
          port: {{ .Values.backend.service.metricsPort }}
{{- end }}
---
{{- end }}
{{- if .Values.web.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "aimvision.web.fullname" . }}-allow-ingress-controller
  labels:
    {{- include "aimvision.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  podSelector:
    matchLabels:
      {{- include "aimvision.web.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            {{- toYaml .Values.networkPolicy.ingressControllerNamespaceSelector | nindent 12 }}
      ports:
        - protocol: TCP
          port: {{ .Values.web.service.port }}
---
{{- end }}
{{- if .Values.ollama.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "aimvision.ollama.fullname" . }}-allow-backend
  labels:
    {{- include "aimvision.labels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
spec:
  podSelector:
    matchLabels:
      {{- include "aimvision.ollama.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "aimvision.backend.selectorLabels" . | nindent 14 }}
        - podSelector:
            matchLabels:
              {{- include "aimvision.worker.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.ollama.service.port }}
---
{{- end }}
{{- if .Values.minio.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "aimvision.minio.fullname" . }}-allow-backend
  labels:
    {{- include "aimvision.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  podSelector:
    matchLabels:
      {{- include "aimvision.minio.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "aimvision.backend.selectorLabels" . | nindent 14 }}
        - podSelector:
            matchLabels:
              {{- include "aimvision.worker.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.minio.service.port }}
{{- end }}
{{- end }}
