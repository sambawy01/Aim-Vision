{{- if .Values.minio.enabled -}}
{{- /*
Single-replica MinIO for federation on-prem appliances. Federation IT can
swap to a 3-node distributed mode by overriding values; for v0.1.0 we keep
it simple: one Pod, one PVC, treated as the S3 endpoint by the backend.

Cloud uses S3 directly — `.Values.minio.enabled = false` in values-cloud.yaml.
*/ -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "aimvision.minio.fullname" . }}
  labels:
    {{- include "aimvision.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  serviceName: {{ include "aimvision.minio.fullname" . }}-headless
  replicas: {{ .Values.minio.replicas }}
  selector:
    matchLabels:
      {{- include "aimvision.minio.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "aimvision.minio.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "aimvision.serviceAccountName" . }}
      {{- include "aimvision.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- toYaml .Values.minio.podSecurityContext | nindent 8 }}
      containers:
        - name: minio
          image: {{ include "aimvision.image" (dict "image" .Values.minio.image "global" .Values.global) | quote }}
          imagePullPolicy: {{ .Values.minio.image.pullPolicy }}
          args:
            - "server"
            - "/data"
            - "--console-address"
            - ":{{ .Values.minio.service.consolePort }}"
          ports:
            - name: api
              containerPort: {{ .Values.minio.service.port }}
              protocol: TCP
            - name: console
              containerPort: {{ .Values.minio.service.consolePort }}
              protocol: TCP
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.minio.credentialsSecretName }}
                  key: rootUser
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.minio.credentialsSecretName }}
                  key: rootPassword
            - name: MINIO_PROMETHEUS_AUTH_TYPE
              value: "public"
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: api
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: api
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 5
          resources:
            {{- toYaml .Values.minio.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.minio.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "aimvision.minio.selectorLabels" . | nindent 10 }}
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.minio.storage.storageClass }}
        storageClassName: {{ .Values.minio.storage.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.minio.storage.size | quote }}
{{- end }}
