{{- if .Values.web.enabled -}}
{{- /*
React SPA served from a tiny nginx (or distroless static) container. The web
tier is a thin client over the FastAPI gateway; see ADR-0001 + ADR-0008.
*/ -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aimvision.web.fullname" . }}
  labels:
    {{- include "aimvision.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
  {{- with (include "aimvision.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.web.replicas }}
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "aimvision.web.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "aimvision.web.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "aimvision.serviceAccountName" . }}
      {{- include "aimvision.imagePullSecrets" . | nindent 6 }}
      securityContext:
        {{- toYaml .Values.web.podSecurityContext | nindent 8 }}
      containers:
        - name: web
          image: {{ include "aimvision.image" (dict "image" .Values.web.image "global" .Values.global) | quote }}
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.web.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.web.containerSecurityContext | nindent 12 }}
          volumeMounts:
            # nginx needs writable tmp + cache + run dirs even on a read-only rootfs
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
{{- end }}
