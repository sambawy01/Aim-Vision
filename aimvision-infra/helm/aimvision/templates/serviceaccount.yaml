{{- /*
Single ServiceAccount for now; we will split out per-component SAs once we
attach IRSA / Workload Identity (cloud) or RBAC bindings (on-prem).
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "aimvision.serviceAccountName" . }}
  labels:
    {{- include "aimvision.labels" . | nindent 4 }}
  {{- with (include "aimvision.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: true
