{{- if and .Values.web.enabled .Values.web.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "aimvision.web.fullname" . }}
  labels:
    {{- include "aimvision.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
  annotations:
    {{- with .Values.web.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.web.ingress.className }}
  ingressClassName: {{ .Values.web.ingress.className }}
  {{- end }}
  {{- if .Values.web.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ include "aimvision.web.host" . | quote }}
      secretName: {{ .Values.web.ingress.tls.secretName | quote }}
  {{- end }}
  rules:
    - host: {{ include "aimvision.web.host" . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "aimvision.web.fullname" . }}
                port:
                  number: {{ .Values.web.service.port }}
{{- end }}
