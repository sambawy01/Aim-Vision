{{- /*
Backend secrets — rendered as ONE of:
  - SealedSecret (bitnami-labs/sealed-secrets) for air-gappable on-prem
  - ExternalSecret (external-secrets/external-secrets-operator) for cloud,
    pulling from AWS Secrets Manager / GCP Secret Manager via a ClusterSecretStore.

The resulting Secret name is .Values.secrets.backend.name; backend and worker
Deployments envFrom this Secret.

Both controllers must be installed cluster-wide before this template renders
into a working secret. See manifests/sealed-secrets/install.md and the cloud
runbook for ESO bootstrap.
*/ -}}
{{- $b := .Values.secrets.backend -}}
{{- if eq $b.provider "external" }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ $b.name }}
  labels:
    {{- include "aimvision.labels" . | nindent 4 }}
    app.kubernetes.io/component: secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ $b.external.secretStoreRef.name | quote }}
    kind: {{ $b.external.secretStoreRef.kind | quote }}
  target:
    name: {{ $b.name }}
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
  data:
    {{- range $b.external.data }}
    - secretKey: {{ .secretKey | quote }}
      remoteRef:
        key: {{ .remoteRef.key | quote }}
        {{- with .remoteRef.property }}
        property: {{ . | quote }}
        {{- end }}
        {{- with .remoteRef.version }}
        version: {{ . | quote }}
        {{- end }}
    {{- end }}
{{- else if eq $b.provider "sealed" }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ $b.name }}
  labels:
    {{- include "aimvision.labels" . | nindent 4 }}
    app.kubernetes.io/component: secrets
  annotations:
    sealedsecrets.bitnami.com/cluster-wide: "false"
spec:
  encryptedData:
    {{- if $b.sealed.encryptedData }}
    {{- range $k, $v := $b.sealed.encryptedData }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
    {{- else }}
    # Empty placeholder — replace with `kubeseal` output before applying.
    PLACEHOLDER: "AgB+placeholder=="
    {{- end }}
  template:
    metadata:
      name: {{ $b.name }}
      labels:
        {{- include "aimvision.labels" . | nindent 8 }}
    type: Opaque
{{- else }}
{{- fail (printf "unknown secrets.backend.provider %q (must be \"external\" or \"sealed\")" $b.provider) -}}
{{- end }}
